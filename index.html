<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maxxilot — Réserver un colis</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:#f4f5f7; margin:0; padding:0; color:#1a1a1a; }
    .wrap { max-width:440px; margin:0 auto; padding:20px 16px 32px; }
    .header { background:#000; border-radius:14px 14px 0 0; padding:18px; text-align:center; }
    .header img { max-width:260px; width:80%; height:auto; display:inline-block; }
    .info { margin-top:0; background:#fff; border-radius:0 0 14px 14px; padding:18px 20px; box-shadow:0 2px 12px rgba(0,0,0,.08); font-size:14px; }
    .info h2 { font-size:15px; margin:0 0 10px; }
    .info a { color:#c1121f; text-decoration:none; font-weight:600; }
    .info .row { display:flex; gap:10px; margin:6px 0; color:#333; }
    .info .row .lbl { min-width:64px; color:#888; }
    .card { background:#fff; border-radius:14px; margin-top:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    h1 { font-size:20px; margin:0 0 4px; }
    p.sub { margin:0 0 18px; color:#666; font-size:14px; }
    label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
    input, select { width:100%; padding:12px; border:1px solid #d0d3d9; border-radius:9px; font-size:16px; background:#fff; }
    button { width:100%; margin-top:22px; padding:14px; border:0; border-radius:9px; background:#c1121f; color:#fff; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.3px; }
    button:disabled { background:#e08a91; cursor:default; }
    #msg { margin-top:18px; padding:14px; border-radius:9px; font-size:14px; display:none; }
    #msg.ok  { background:#e7f6ec; color:#1a7f37; display:block; }
    #msg.err { background:#fde8e8; color:#b42318; display:block; }
  </style>

    <div class="info">
      <h2>Venir au magasin</h2>
      <div class="row"><span class="lbl">Adresse</span>
        <a href="https://www.google.com/maps/search/?api=1&query=18+Rue+du+Moulin+aux+Moines+72650+La+Chapelle-Saint-Aubin" target="_blank" rel="noopener">18 Rue du Moulin aux Moines, 72650 La Chapelle-Saint-Aubin</a></div>
      <div class="row"><span class="lbl">Lun–Ven</span><span>10h–12h30 &nbsp;et&nbsp; 14h–19h</span></div>
      <div class="row"><span class="lbl">Samedi</span><span>10h–19h</span></div>
    </div>

    <div class="card">
      <h1>Réserver un colis</h1>
      <p class="sub">Premier arrivé, premier servi. Retrait et paiement en magasin.</p>

      <label>Numéro de colis</label>
      <select id="colis"><option value="">Chargement…</option></select>

      <label>Ton nom</label>
      <input type="text" id="nom" placeholder="Prénom Nom">

      <label>Ton numéro de téléphone</label>
      <input type="tel" id="tel" placeholder="06 12 34 56 78">

      <button id="btn" onclick="envoyer()">Réserver</button>
      <div id="msg"></div>
    </div>
  </div>

  <script>
    var API = "https://script.google.com/macros/s/AKfycbzMbK7prlqKttvuBqBcmmEAeUsRQn-OmgWlNiMnh-qwQtrdLbpm-WAKCswbPO0EH44ANA/exec";

    function prix(v){ return (v === '' || v === null || v === undefined) ? '' : (' — ' + String(v).replace('.', ',') + ' €'); }

    function chargerColis(){
      var sel = document.getElementById('colis');
      fetch(API + '?action=list')
        .then(function(r){ return r.json(); })
        .then(function(data){
          var list = (data && data.colis) ? data.colis : [];
          if (!list.length){ sel.innerHTML = '<option value="">Aucun colis disponible</option>'; return; }
          sel.innerHTML = '<option value="">Choisis un colis…</option>';
          list.forEach(function(c){
            var o = document.createElement('option');
            o.value = c.numero;
            var ref = c.reference ? ' (' + c.reference + ')' : '';
            o.textContent = 'Colis n°' + c.numero + ' — ' + c.modele + ref + prix(c.prixVendu);
            sel.appendChild(o);
          });
        })
        .catch(function(){ sel.innerHTML = '<option value="">Erreur de chargement, réessaie</option>'; });
    }
    chargerColis();

    function envoyer(){
      var colis = document.getElementById('colis').value;
      var nom   = document.getElementById('nom').value;
      var tel   = document.getElementById('tel').value;
      var msg   = document.getElementById('msg');
      var btn   = document.getElementById('btn');
      if (!colis || !nom || !tel){ msg.className='err'; msg.textContent='Merci de remplir tous les champs.'; return; }
      btn.disabled = true; btn.textContent = 'Envoi…'; msg.style.display = 'none';
      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action:'reserver', numero:colis, nom:nom, tel:tel })
      })
      .then(function(r){ return r.json(); })
      .then(function(res){
        msg.className = res.ok ? 'ok' : 'err';
        msg.textContent = res.message;
        if (res.ok){ btn.textContent = 'Réservé \u2714'; }
        else { btn.disabled = false; btn.textContent = 'Réserver'; chargerColis(); }
      })
      .catch(function(){ msg.className='err'; msg.textContent='Erreur réseau, réessaie.'; btn.disabled=false; btn.textContent='Réserver'; });
    }
  </script>
